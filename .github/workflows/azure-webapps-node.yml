on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-app-name    # Remplacez par votre nom d'app Azure
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # Chemin de votre projet (racine par défaut)
  NODE_VERSION: '24.x'                # Version LTS recommandée par GitHub Actions

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js (v24.x)
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Create package-lock.json if missing
      run: |
        if [ ! -f "package-lock.json" ]; then
          echo "⚠️ package-lock.json manquant - création automatique..."
          npm init -y
          npm install --package-lock-only
          echo "✅ package-lock.json créé avec succès"
        fi

    - name: Install dependencies
      run: npm ci --omit=dev  # Utilise le lockfile pour une installation reproductible

    - name: Build and test
      run: |
        npm run build --if-present
        npm run test --if-present

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: .

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: Deploy to Azure WebApp
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
